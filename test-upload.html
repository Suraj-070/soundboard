<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soundboard Upload Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 500px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    input[type="text"],
    input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="file"]:focus {
      outline: none;
      border-color: #667eea;
    }

    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
      width: 100%;
    }

    .file-input-wrapper input[type="file"] {
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .result.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .result.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .sounds-list {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 2px solid #e0e0e0;
    }

    .sounds-list h2 {
      color: #333;
      margin-bottom: 15px;
      font-size: 20px;
    }

    .sound-item {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sound-info {
      flex: 1;
    }

    .sound-name {
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }

    .sound-category {
      font-size: 12px;
      color: #666;
      background: #e0e0e0;
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
    }

    .play-btn {
      padding: 8px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .play-btn:hover {
      background: #764ba2;
    }

    .loading {
      text-align: center;
      color: #666;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 Soundboard Upload</h1>
    <p class="subtitle">Upload MP3 files to your Discord soundboard</p>

    <form id="uploadForm">
      <div class="form-group">
        <label for="name">Sound Name *</label>
        <input type="text" id="name" name="name" placeholder="Epic Fail" required>
      </div>

      <div class="form-group">
        <label for="category">Category *</label>
        <input type="text" id="category" name="category" placeholder="memes" required>
      </div>

      <div class="form-group">
        <label for="audio">Audio File (MP3, max 10MB) *</label>
        <div class="file-input-wrapper">
          <input type="file" id="audio" name="audio" accept=".mp3,audio/mpeg" required>
        </div>
      </div>

      <button type="submit" id="submitBtn">Upload Sound</button>
    </form>

    <div id="result" class="result"></div>

    <div class="sounds-list">
      <h2>📚 All Sounds</h2>
      <div id="soundsList" class="loading">Loading sounds...</div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api/sounds';

    // Load all sounds on page load
    async function loadSounds() {
      try {
        const response = await fetch(API_URL);
        const sounds = await response.json();
        
        const soundsList = document.getElementById('soundsList');
        
        if (sounds.length === 0) {
          soundsList.innerHTML = '<p style="color: #666; text-align: center;">No sounds uploaded yet</p>';
          return;
        }

        soundsList.innerHTML = sounds.map(sound => `
          <div class="sound-item">
            <div class="sound-info">
              <div class="sound-name">${sound.name}</div>
              <span class="sound-category">${sound.category}</span>
            </div>
            <button class="play-btn" onclick="playSound('${sound._id}')">▶ Play</button>
          </div>
        `).join('');
      } catch (error) {
        document.getElementById('soundsList').innerHTML = '<p style="color: #e74c3c;">Failed to load sounds</p>';
        console.error('Error loading sounds:', error);
      }
    }

    // Play sound via Socket.IO event (will be implemented later)
    function playSound(soundId) {
      alert(`Playing sound: ${soundId}\n\n(Socket.IO connection will be added in Phase 3)`);
    }

    // Handle form submission
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const submitBtn = document.getElementById('submitBtn');
      const resultDiv = document.getElementById('result');

      // Disable button
      submitBtn.disabled = true;
      submitBtn.textContent = 'Uploading...';
      resultDiv.style.display = 'none';

      // Prepare form data
      const formData = new FormData();
      formData.append('name', document.getElementById('name').value);
      formData.append('category', document.getElementById('category').value);
      formData.append('audio', document.getElementById('audio').files[0]);

      try {
        const response = await fetch(`${API_URL}/upload`, {
          method: 'POST',
          body: formData,
        });

        const data = await response.json();

        if (response.ok) {
          resultDiv.className = 'result success';
          resultDiv.textContent = `✅ Sound "${data.name}" uploaded successfully!`;
          document.getElementById('uploadForm').reset();
          loadSounds(); // Reload sounds list
        } else {
          resultDiv.className = 'result error';
          resultDiv.textContent = `❌ Error: ${data.error}`;
        }
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.textContent = `❌ Network error: ${error.message}`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Upload Sound';
      }
    });

    // Load sounds on page load
    loadSounds();
  </script>
</body>
</html>
